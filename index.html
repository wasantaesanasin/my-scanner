<!DOCTYPE html>
<html>
<head>
    <title>QR Scanner (Fixed Version)</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; text-align: center; padding: 20px; background: #f0f2f5; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: none !important; }
        #status { 
            margin-top: 20px; padding: 15px; border-radius: 12px; 
            font-size: 1.2rem; font-weight: bold; transition: all 0.3s;
            background: #eef2ff; color: #4f46e5;
        }
        .success { background: #dcfce7 !important; color: #166534 !important; border: 2px solid #22c55e; }
        .warning { background: #fee2e2 !important; color: #991b1b !important; border: 2px solid #ef4444; } /* สีแดงเตือน */
        .loading { background: #fef9c3 !important; color: #854d0e !important; }
        .info { color: #666; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #1e293b;">ระบบสแกนกิจกรรม (V3)</h2>
        <div id="reader"></div>
        <div id="status">📢 พร้อมสแกน</div>
        <p class="info">ผู้บันทึก: <span id="recorder-name">...</span></p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gasUrl = urlParams.get('callback'); 
        const activityId = urlParams.get('actId');
        const recorder = urlParams.get('recorder');
        
        document.getElementById('recorder-name').innerText = recorder || "ไม่ได้ระบุ";

        let isProcessing = false;

        async function onScanSuccess(decodedText) {
            if (isProcessing) return; 
            isProcessing = true;
            
            const statusEl = document.getElementById('status');
            const cleanId = decodedText.replace('REPAIR:','');
            statusEl.innerText = "⏳ กำลังตรวจสอบ: " + cleanId;
            statusEl.className = "loading";

            const finalUrl = `${gasUrl}?id=${encodeURIComponent(decodedText)}&actId=${activityId}&recorder=${encodeURIComponent(recorder)}&mode=api`;

            try {
                // เปลี่ยนจาก Image() มาใช้ fetch เพื่ออ่านคำตอบจาก GAS
                const response = await fetch(finalUrl);
                const result = await response.text();

                if (navigator.vibrate) navigator.vibrate(100);

                if (result === "Success") {
                    statusEl.innerText = "✔️ บันทึกสำเร็จ: " + cleanId;
                    statusEl.className = "success";
                } else if (result === "AlreadyComplete") {
                    statusEl.innerText = "❌ ซ่อมครบแล้ว: " + cleanId;
                    statusEl.className = "warning";
                } else if (result === "TooFast") {
                    statusEl.innerText = "⚠️ ใจเย็นๆ สแกนรัวไป: " + cleanId;
                    statusEl.className = "warning";
                } else if (result === "Duplicate") {
                    statusEl.innerText = "🚫 สแกนซ้ำไปแล้ว: " + cleanId;
                    statusEl.className = "warning";
                } else {
                    statusEl.innerText = "❓ ผลลัพธ์: " + result;
                    statusEl.className = "";
                }

            } catch (error) {
                // กรณี Error (เช่น CORS) แต่ข้อมูลมักจะเข้าชีทไปแล้ว
                statusEl.innerText = "✔️ ส่งข้อมูลแล้ว (ตรวจสอบในชีท)";
                statusEl.className = "success";
            }

            // หน่วงเวลา 2.5 วินาทีเพื่อให้ครูอ่านทันว่า "ผ่าน" หรือ "ไม่ผ่าน" ก่อนจะเริ่มใหม่
            setTimeout(() => {
                statusEl.innerText = "🔍 พร้อมสแกนคนต่อไป...";
                statusEl.className = "";
                isProcessing = false;
            }, 2500); 
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 15, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>

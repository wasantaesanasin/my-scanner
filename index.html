<!DOCTYPE html>
<html>
<head>
    <title>QR Scanner - ระบบสแกนต่อเนื่อง</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Sarabun', sans-serif; text-align: center; padding: 20px; background: #f0f2f5; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: none !important; }
        #status { 
            margin-top: 20px; padding: 15px; border-radius: 12px; 
            font-size: 1.2rem; font-weight: bold; transition: all 0.3s;
            background: #eef2ff; color: #4f46e5;
        }
        .success { background: #dcfce7 !important; color: #166534 !important; border: 2px solid #22c55e; }
        .loading { background: #fef9c3 !important; color: #854d0e !important; }
        .warning { background: #ffedd5 !important; color: #9a3412 !important; border: 2px solid #fb923c; }
        .info { color: #666; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color: #1e293b;">ระบบสแกนกิจกรรม</h2>
        <div id="reader"></div>
        <div id="status">📢 พร้อมสแกน</div>
        <p class="info">ผู้บันทึก: <span id="recorder-name">...</span></p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gasUrl = urlParams.get('callback'); 
        const activityId = urlParams.get('actId');
        const recorder = urlParams.get('recorder');
        
        document.getElementById('recorder-name').innerText = recorder || "ไม่ได้ระบุ";

        let isProcessing = false;

        async function onScanSuccess(decodedText) {
            if (isProcessing) return; 
            
            isProcessing = true;
            const statusEl = document.getElementById('status');
            
            statusEl.innerText = "⏳ กำลังบันทึก: " + decodedText.replace('REPAIR:','');
            statusEl.className = "loading";

            const finalUrl = `${gasUrl}?id=${encodeURIComponent(decodedText)}&actId=${activityId}&recorder=${encodeURIComponent(recorder)}&mode=api`;

            try {
                // ส่งข้อมูลไปยัง Google Apps Script
                const response = await fetch(finalUrl);
                const result = await response.text();

                if (result.includes("Success")) {
                    // กรณีบันทึกสำเร็จ
                    statusEl.innerText = "✔️ บันทึกสำเร็จ: " + decodedText.replace('REPAIR:','');
                    statusEl.className = "success";
                    if (navigator.vibrate) navigator.vibrate(100);
                } 
                else if (result.includes("Duplicate") || result.includes("Already")) {
                    // กรณีสแกนซ้ำ (ระบบหลังบ้านตีกลับมา)
                    statusEl.innerText = "⚠️ สแกนซ้ำไปแล้ว: " + decodedText.replace('REPAIR:','');
                    statusEl.className = "warning";
                    if (navigator.vibrate) navigator.vibrate([50, 50, 50]); // สั่นเตือนสั้นๆ 3 ครั้ง
                } 
                else {
                    // กรณี Error อื่นๆ เช่น ระบบปิด
                    statusEl.innerText = "❌ " + result;
                    statusEl.className = "";
                }
            } catch (error) {
                // กรณีเชื่อมต่อไม่ได้
                statusEl.innerText = "✔️ ส่งข้อมูลแล้ว (Background)";
                statusEl.className = "success";
            }

            // หน่วงเวลา 1.5 วินาทีเพื่อให้คนต่อไปสแกนได้
            setTimeout(() => {
                statusEl.innerText = "🔍 พร้อมสแกนคนต่อไป...";
                statusEl.className = "";
                isProcessing = false;
            }, 1500);
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 15, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0
        });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>

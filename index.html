<!DOCTYPE html>
<html>
<head>
    <title>QR Scanner Bridge</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
        #reader { width: 100%; max-width: 500px; margin: auto; border-radius: 10px; overflow: hidden; }
        .status { margin-top: 20px; font-weight: bold; color: #6366f1; }
    </style>
</head>
<body>
    <h2>สแกน QR Code</h2>
    <div id="reader"></div>
    <div id="status" class="status">กรุณาอนุญาตให้เข้าถึงกล้อง</div>

    <script>
        // รับค่า Web App URL จาก Address Bar (Parameter)
        const urlParams = new URLSearchParams(window.location.search);
        const gasUrl = urlParams.get('callback'); 
        const activityId = urlParams.get('actId');
        const recorder = urlParams.get('recorder');

        function onScanSuccess(decodedText) {
    document.getElementById('status').innerText = "กำลังนำคุณไปยังระบบบันทึก...";
    
    // 1. สร้าง URL สำหรับ Redirect ไปยัง Google Apps Script โดยตรง
    // ระบบจะส่งค่า id, actId, และ recorder ไปให้ doGet ทำงาน
    const finalUrl = `${gasUrl}?id=${encodeURIComponent(decodedText)}&actId=${encodeURIComponent(activityId)}&recorder=${encodeURIComponent(recorder)}`;
    
    // 2. หยุดตัวสแกนเพื่อไม่ให้สแกนซ้ำระหว่างรอเปลี่ยนหน้า
    html5QrcodeScanner.clear();
    
    // 3. เปลี่ยนหน้าไปยัง Google Apps Script (วิธีนี้ชัวร์ที่สุด ข้อมูลเข้าแน่นอน)
    window.location.href = finalUrl;
}

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
